name: Rust

on:
  push:
    branches: [ "master" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - name: Build release
      run: cargo build --release --verbose
    - name: Rename binary
      shell: pwsh
      run: |
        Copy-Item target/release/windisplaymanager_rs.exe windisplaymanager_rs-${{ github.ref_name }}.exe
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: windisplaymanager_rs-${{ github.ref_name }}.exe
        generate_release_notes: true
